version: '3.8'

services:
  genai-app:
    build: .
    container_name: genai_curriculum
    volumes:
      - .:/app
    env_file:
      - .env
    stdin_open: true # Allows interactive mode (docker attach)
    tty: true        # Allows interactive mode
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
      - "8003:8003"
      - "8004:8004"
